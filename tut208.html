<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: aliceblue;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #212121;
        }
        /* .continar{
            position: relative;
        } */
        .clock{
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0px 0px 30px rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock span{
            position: absolute;
            transform: rotate(calc(30deg* var(--i)));  /* 360/12 = 30 */
            inset: 12px;
            text-align: center;
        }

        .clock span b{
            transform:rotate(calc(-30deg * var(--i)));
            display: inline-block;
            font-size: 20px;
        }

        .clock::before{
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: aliceblue;
            z-index: 2;
        }

        .hand{
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .hand i{
            position: absolute;
            background-color: var(--clr);
            width: 4px;
            height: var(--h);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="continar">
        <div class="clock">

            <div style="--clr:rgb(187, 29, 55); --h:74px;"id="hours" class="hand"><i></i></div>
            <div style="--clr: rgb(15, 173, 236); --h:84px;"id="min"class="hand"><i></i></div>
            <div style="--clr: rgb(204, 204, 10); --h:94px;"id="sec" class="hand"><i></i></div>

            <span style="--i:1"><b>1</b></span>
            <span style="--i:2"><b>2</b></span>
            <span style="--i:3"><b>3</b></span>
            <span style="--i:4"><b>4</b></span>
            <span style="--i:5"><b>5</b></span>
            <span style="--i:6"><b>6</b></span>
            <span style="--i:7"><b>7</b></span>
            <span style="--i:8"><b>8</b></span>
            <span style="--i:9"><b>9</b></span>
            <span style="--i:10"><b>10</b></span>
            <span style="--i:11"><b>11</b></span>
            <span style="--i:12"><b>12</b></span>
        </div>
    </div>
   
    <!-- 
    ### For hours ###

    12 hour = 360deg 
     1 hour = 360/12 = 30
     h hour = 30h + m/2

     60 min = 30deg
     1 min = 30/60 = 1/2 deg
     m min = (1/2)m 
     
     ### fo minutes ###

     60 min = 360deg 
     1 min = 360/60 = 6deg
     m min = 6m deg

     ### for seconds ###

     60 sec = 360 deg
     1 sec = 360/60 = 6deg
     s second = 6s
     
     -->
    <script>
        let hours = document.getElementById('hours');
        let min = document.getElementById('min');
        let sec = document.getElementById('sec');

        function displaytime(){
            let date = new Date();

            let hh = date.getHours();
            let mm = date.getMinutes();
            let ss = date.getSeconds();
            
            let hourrotation = 30*hh + mm/2;
            let minrotation = 6*mm;
            let secrotation = 6*ss;

            hours.style.transform = `rotate(${hourrotation}deg)`;
            min.style.transform = `rotate(${minrotation}deg)`;
            sec.style.transform = `rotate(${secrotation}deg)`;



        }

        setInterval(displaytime,1000);


    </script>
</body>
</html>
